services:
  postgres:
    image: postgres:16-alpine
    container_name: ciotx-db
    environment:
      POSTGRES_USER: ciotx
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ciotx
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ciotx"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ciotx-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ciotx-api
    environment:
      DATABASE_URL: postgresql+asyncpg://ciotx:${DB_PASSWORD}@postgres:5432/ciotx
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SECRET_KEY: ${SECRET_KEY}
      DOMAIN_NAME: ${DOMAIN_NAME:-}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:3000}
      DEV_MODE: ${DEV_MODE:-true}
      DEV_AUTO_PLAN: ${DEV_AUTO_PLAN:-pro}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # LLM
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      CUSTOM_API_KEY: ${CUSTOM_API_KEY:-}
      CUSTOM_BASE_URL: ${CUSTOM_BASE_URL:-}
      CIOTX_RELAY_URL: ${CIOTX_RELAY_URL:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      LLM_FALLBACK: ${LLM_FALLBACK:-}
      LLM_TIMEOUT_SEC: ${LLM_TIMEOUT_SEC:-120}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      # GitHub
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_PRIVATE_KEY_PATH: ${GITHUB_PRIVATE_KEY_PATH:-}
      # Billing
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      TRIAL_DAYS: ${TRIAL_DAYS:-7}
      TRIAL_SCAN_LIMIT: ${TRIAL_SCAN_LIMIT:-10}
      STARTER_SCAN_LIMIT: ${STARTER_SCAN_LIMIT:-20}
      STARTER_PRICE_MONTHLY: ${STARTER_PRICE_MONTHLY:-39900}
      STARTER_PRICE_ANNUAL: ${STARTER_PRICE_ANNUAL:-399900}
      PRO_PRICE_MONTHLY: ${PRO_PRICE_MONTHLY:-149900}
      PRO_PRICE_ANNUAL: ${PRO_PRICE_ANNUAL:-1499900}
      # Internal
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile.worker
    container_name: ciotx-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://ciotx:${DB_PASSWORD}@postgres:5432/ciotx
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SECRET_KEY: ${SECRET_KEY}
      DEV_MODE: ${DEV_MODE:-true}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CUSTOM_API_KEY: ${CUSTOM_API_KEY:-}
      CUSTOM_BASE_URL: ${CUSTOM_BASE_URL:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: ciotx-dashboard
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-}
      NEXT_PUBLIC_API_URL: ${API_BASE_URL:-http://localhost:8000}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - api
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
