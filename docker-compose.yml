# ═══════════════════════════════════════════════════════════
# CIOTX — Docker Compose
#
# To deploy: copy .env.example → .env, fill values, then run:
#   docker compose up -d --build
#
# To build CLI binaries (output → ./bin/):
#   docker compose --profile cli up --build cli-builder
# ═══════════════════════════════════════════════════════════

services:

  # ── Database ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ciotx-db
    environment:
      POSTGRES_USER: ciotx
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ciotx
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ciotx"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Cache / Queue ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ciotx-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API (FastAPI) ──────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ciotx-api
    env_file: .env
    environment:
      # Override connection strings to use Docker service names
      DATABASE_URL: postgresql+asyncpg://ciotx:${DB_PASSWORD}@postgres:5432/ciotx
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Background Worker (ARQ) ────────────────────
  worker:
    build:
      context: ./api
      dockerfile: Dockerfile.worker
    container_name: ciotx-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ciotx:${DB_PASSWORD}@postgres:5432/ciotx
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Dashboard (Next.js) ────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js bundle at build time — must match API_BASE_URL in .env
        NEXT_PUBLIC_API_URL: ${API_BASE_URL:-http://localhost:8000}
    container_name: ciotx-dashboard
    environment:
      NODE_ENV: production
    depends_on:
      - api
    restart: unless-stopped

  # ── Nginx Reverse Proxy ────────────────────────
  # Terminates HTTP at port 80.
  # Routes: DOMAIN_NAME → dashboard:3000, api.DOMAIN_NAME → api:8000
  # For HTTPS: run certbot on the host after first boot.
  nginx:
    image: nginx:1.25-alpine
    container_name: ciotx-nginx
    # envsubst fills ${DOMAIN_NAME} in the template, then starts nginx
    command: >
      /bin/sh -c
      "envsubst '$$DOMAIN_NAME' < /etc/nginx/templates/default.conf.template
      > /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-localhost}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./bin:/usr/share/nginx/html/bin:ro
      - ./nginx/install.sh:/usr/share/nginx/html/install.sh:ro
      # certbot SSL certificates (populated after running certbot on host)
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - dashboard
    restart: unless-stopped

  # ── CLI Builder ────────────────────────────────────────────
  # Runs automatically with `docker compose up --build`.
  # Copies platform binaries into ./bin/ then exits.
  cli-builder:
    build:
      context: ./cli
      dockerfile: Dockerfile
      args:
        API_URL: ${API_BASE_URL:-http://localhost:8000}
        DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:3000}
    container_name: ciotx-cli-builder
    volumes:
      - ./bin:/output
    command: /bin/sh -c "cp -r /builds/. /output/ && echo 'CLI binaries ready in ./bin/'"
    restart: "no"

volumes:
  pgdata:
  redisdata:
